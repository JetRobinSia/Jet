<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Art of You | Crystal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --accent: #c5a880;
            --text: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 1000; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }

        /* --- LOGIN SECTION --- */
        #auth-section { height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; background: #fff; z-index: 2000; position: relative; }
        .auth-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; }
        .auth-content p { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; opacity: 0.6; }
        
        /* Modern Calendar Picker Styling */
        input[type="date"] {
            background: transparent;
            border: 1px solid #ddd;
            padding: 12px;
            width: 250px;
            text-align: center;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            border-radius: 4px;
            transition: 0.5s;
            cursor: pointer;
        }
        input[type="date"]:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(197, 168, 128, 0.1); }

        .enter-btn { display: block; margin: 30px auto; background: none; border: 1px solid var(--accent); padding: 12px 50px; color: var(--accent); cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; transition: 0.4s; }
        .enter-btn:hover { background: var(--accent); color: white; }

        /* --- GALLERY SECTION --- */
        #gallery-section { display: none; padding: 100px 10%; animation: pageFade 1.5s ease; }
        @keyframes pageFade { from { opacity: 0; } to { opacity: 1; } }
        
        .header { text-align: center; margin-bottom: 60px; opacity: 0; transform: translateY(20px); transition: 1s forwards; }
        .header.visible { opacity: 1; transform: translateY(0); }
        .header h2 { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; font-weight: 300; font-style: italic; }

        .nav-container { text-align: center; margin-bottom: 80px; }
        .nav-btn, .logout-btn { display: inline-block; text-decoration: none; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 12px 35px; transition: 0.4s; cursor: pointer; background: none; }
        .nav-btn:hover, .logout-btn:hover { background: var(--accent); color: white; }

        .masonry { column-count: 2; column-gap: 50px; max-width: 1100px; margin: 0 auto; }
        .card { break-inside: avoid; margin-bottom: 60px; opacity: 0; transform: translateY(30px); transition: 1s; }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card img { width: 100%; border-radius: 4px; filter: sepia(20%) brightness(95%); transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .card:hover img { filter: sepia(0%) brightness(100%); transform: scale(1.02); }
        .caption { margin-top: 20px; font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; line-height: 1.2; }

        footer { margin-top: 100px; text-align: center; padding-bottom: 50px; opacity: 0; transition: 2s; }
        @media (max-width: 768px) { .masonry { column-count: 1; } .header h2 { font-size: 3rem; } }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <section id="auth-section">
        <div class="auth-content">
            <h1>Ethereal</h1>
            <p>Pick the date it all began</p>
            <input type="date" id="datePicker">
            <button class="enter-btn" onclick="reveal()">Unlock</button>
        </div>
    </section>

    <section id="gallery-section">
        <div class="header" id="header">
            <h2>The Art of You</h2>
            <p style="letter-spacing: 4px; font-size: 0.6rem; text-transform: uppercase; margin-top: 10px;">Crystal</p>
        </div>

        <div class="nav-container">
            <a href="about.html" class="nav-btn">About Her</a>
        </div>

        <div class="masonry">
            

            <div class="card"><img src="pictures/1.jpg"><p class="caption">Elegance in every frame.</p></div>
            <div class="card"><img src="pictures/2.jpg"><p class="caption">The quiet beauty of a moment.</p></div>
            <div class="card"><img src="pictures/3.jpg"><p class="caption">A light that never fades.</p></div>
            <div class="card"><img src="pictures/4.jpg"><p class="caption">Grace personified.</p></div>
            <div class="card"><img src="pictures/5.jpg"><p class="caption">Your spirit, captured.</p></div>
            <div class="card"><img src="pictures/6.jpg"><p class="caption">Simply breathtaking.</p></div>

            
        </div>

        <footer id="final-footer">
            <hr style="width: 50px; margin: 0 auto 30px; border: 0; border-top: 1px solid var(--accent);">
            <p style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-style: italic; color: var(--accent); margin-bottom: 40px;">Endless beauty in every detail.</p>
            <button class="logout-btn" onclick="logout()">Exit Gallery</button>
        </footer>
    </section>

    <script>
        function reveal() {
            const selectedDate = document.getElementById('datePicker').value;
            // The HTML5 date picker returns YYYY-MM-DD
            // For 05/04/23, the value is "2023-05-04"
            if(selectedDate === "2023-05-04") {
                localStorage.setItem("crystalLoggedIn", "true");
                showGallery();
            } else { 
                alert("That isn't the date. Try again."); 
            }
        }

        function showGallery() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('gallery-section').style.display = 'block';
            setTimeout(() => {
                document.getElementById('header').classList.add('visible');
                const cards = document.querySelectorAll('.card');
                cards.forEach((card, index) => {
                    setTimeout(() => card.classList.add('visible'), index * 200);
                });
                setTimeout(() => { document.getElementById('final-footer').style.opacity = "1"; }, 1500);
            }, 100);
        }

        function logout() {
            localStorage.removeItem("crystalLoggedIn");
            location.reload();
        }

        window.onload = function() {
            if (localStorage.getItem("crystalLoggedIn") === "true") { 
                showGallery(); 
            }
        };

        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };
    </script>
</body>

</html>
